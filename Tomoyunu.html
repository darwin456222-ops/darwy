<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tom ve Arkadaşları: Dövüş</title>
    <style>
        body { margin: 0; font-family: Arial, sans-serif; background: #111; color: white; overflow: hidden; touch-action: manipulation; }
        #selection-screen { position: fixed; inset: 0; background: #222; z-index: 2000; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .char-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-top: 20px; }
        .char-item { background: #333; padding: 10px; border-radius: 10px; text-align: center; cursor: pointer; border: 2px solid transparent; }
        .char-item:active { border-color: #00f2fe; background: #444; }
        .char-item span { font-size: 25px; display: block; }
        .char-item p { margin: 5px 0 0; font-size: 12px; }
        
        #arena { width: 100%; height: 55vh; background: radial-gradient(circle, #1e3c72, #0a1114); position: relative; display: flex; justify-content: center; align-items: flex-end; border-bottom: 3px solid #fff; }
        .hud { position: absolute; top: 10px; width: 95%; display: flex; justify-content: space-between; }
        .bar-container { width: 140px; height: 12px; background: #222; border-radius: 6px; border: 1px solid #444; overflow: hidden; }
        .hp-fill { height: 100%; width: 100%; background: #ff0055; transition: width 0.3s; }
        .sp-fill { height: 100%; width: 0%; background: #00f2fe; transition: width 0.3s; }
        
        .char-container { position: absolute; bottom: 20px; display: flex; flex-direction: column; align-items: center; transition: 0.1s; }
        .emoji { font-size: 70px; }
        #p1-wrap { left: 10%; } #p2-wrap { right: 10%; }
        #p2-wrap .emoji { transform: scaleX(-1); }

        /* KONTROLLER */
        #controls { height: 45vh; display: flex; background: #111; }
        .p-area { flex: 1; display: flex; flex-direction: column; border: 1px solid #333; }
        .atk-btn { flex: 2; border: none; font-size: 18px; font-weight: bold; color: white; background: #1a2a6c; outline: none; }
        .ult-btn { flex: 3; border: none; font-size: 24px; font-weight: bold; color: white; background: #222; opacity: 0.4; transition: 0.3s; }
        .ult-ready { background: #ff4757 !important; opacity: 1 !important; color: #fff; box-shadow: inset 0 0 15px #fff; }

        .anim-1 { animation: hitL 0.2s; }
        .anim-2 { animation: hitR 0.2s; }
        @keyframes hitL { 50% { transform: translateX(60px); } }
        @keyframes hitR { 50% { transform: translateX(-60px); } }

        #win-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 3000; }
        button#start-btn { margin-top: 20px; padding: 15px 40px; font-size: 20px; background: #27ae60; color: white; border: none; border-radius: 30px; display: none; }
    </style>
</head>
<body>

<div id="selection-screen">
    <h2>Karakterini Seç</h2>
    <div id="p-select-info">1. Oyuncu Seçiyor...</div>
    <div class="char-grid" id="grid"></div>
    <button id="start-btn" onclick="startMatch()">SAVAŞI BAŞLAT!</button>
</div>

<div id="arena">
    <div class="hud">
        <div>
            <div id="name1">P1</div>
            <div class="bar-container"><div id="h1" class="hp-fill"></div></div>
            <div class="bar-container"><div id="s1" class="sp-fill"></div></div>
        </div>
        <div>
            <div id="name2" style="text-align:right">P2</div>
            <div class="bar-container"><div id="h2" class="hp-fill"></div></div>
            <div class="bar-container" style="margin-left:auto"><div id="s2" class="sp-fill"></div></div>
        </div>
    </div>
    <div id="p1-wrap" class="char-container"><div class="emoji" id="e1"></div></div>
    <div id="p2-wrap" class="char-container"><div class="emoji" id="e2"></div></div>
</div>

<div id="controls">
    <div class="p-area">
        <button class="atk-btn" id="btn-1-atk">SALDIRI</button>
        <button class="ult-btn" id="btn-1-ult">ULTİ</button>
    </div>
    <div class="p-area">
        <button class="atk-btn" id="btn-2-atk" style="background:#b21f1f">SALDIRI</button>
        <button class="ult-btn" id="btn-2-ult">ULTİ</button>
    </div>
</div>

<div id="win-overlay">
    <h1 id="win-text">KAZANDIN!</h1>
    <button onclick="location.reload()" style="padding:10px 20px">Tekrar Oyna</button>
</div>

<script>
    const chars = [
        {n: "Tom", e: "🐱", u: "PENÇE DARBESİ", power: 25}, 
        {n: "Angela", e: "🐈", u: "ŞİFA GÜCÜ", power: -35},
        {n: "Pierre", e: "🦜", u: "SES BOMBASI", power: 22}, 
        {n: "Hank", e: "🐶", u: "KEMİK YAĞMURU", power: 20},
        {n: "Ginger", e: "🐈‍⬛", u: "HAVAVAİ FİŞEK", power: 24}, 
        {n: "Roy", e: "🦝🕶️", u: "BÜYÜK SOYGUN", power: 32},
        {n: "Ben", e: "🐶🧪", u: "İCAT PATLAMASI", power: 30},
        {n: "Becca", e: "🐰🎤", u: "SÜPER KONSER", power: 28},
        {n: "Gina", e: "🦒✨", u: "YILDIZ YAĞMURU", power: 26},
        {n: "Santi", e: "🐐", u: "TEKME FIRTINASI", power: 27}
    ];

    let p1c = null, p2c = null, hp1 = 100, hp2 = 100, sp1 = 0, sp2 = 0;

    function setupSelection() {
        const grid = document.getElementById('grid');
        chars.forEach((c, i) => {
            let d = document.createElement('div');
            d.className = 'char-item';
            d.innerHTML = `<span>${c.e}</span><p>${c.n}</p>`;
            d.onclick = () => select(i);
            grid.appendChild(d);
        });
    }

    function select(i) {
        if (!p1c) {
            p1c = chars[i];
            document.getElementById('p-select-info').innerText = "2. Oyuncu Seçiyor...";
        } else if (!p2c) {
            p2c = chars[i];
            document.getElementById('start-btn').style.display = 'block';
            document.getElementById('p-select-info').innerText = "KADRO HAZIR!";
        }
    }

    function startMatch() {
        document.getElementById('selection-screen').style.display = 'none';
        document.getElementById('name1').innerText = p1c.n;
        document.getElementById('name2').innerText = p2c.n;
        document.getElementById('e1').innerText = p1c.e;
        document.getElementById('e2').innerText = p2c.e;
        document.getElementById('btn-1-ult').innerText = p1c.u;
        document.getElementById('btn-2-ult').innerText = p2c.u;
        bind();
    }

    function bind() {
        const b1a = document.getElementById('btn-1-atk'), b1u = document.getElementById('btn-1-ult');
        const b2a = document.getElementById('btn-2-atk'), b2u = document.getElementById('btn-2-ult');

        b1a.onclick = () => action(1, 'atk');
        b1u.onclick = () => action(1, 'ult');
        b2a.onclick = () => action(2, 'atk');
        b2u.onclick = () => action(2, 'ult');
    }

    function action(p, type) {
        if (hp1 <= 0 || hp2 <= 0) return;

        if (type === 'atk') {
            if (p === 1) {
                hp2 -= p1c.power;
                sp1 = Math.min(100, sp1 + 15);
                anim(1);
            } else {
                hp1 -= p2c.power;
                sp2 = Math.min(100, sp2 + 15);
                anim(2);
            }
        } else {
            if (p === 1 && sp1 >= 100) {
                if (p1c.n === "Angela") hp1 = Math.min(100, hp1 + 40);
                else hp2 -= p1c.power * 2;
                sp1 = 0; anim(1);
            } else if (p === 2 && sp2 >= 100) {
                if (p2c.n === "Angela") hp2 = Math.min(100, hp2 + 40);
                else hp1 -= p2c.power * 2;
                sp2 = 0; anim(2);
            }
        }
        update();
    }

    function anim(p) {
        const el = document.getElementById('p' + p + '-wrap');
        el.classList.remove('anim-1', 'anim-2');
        void el.offsetWidth;
        el.classList.add('anim-' + p);
    }

    function update() {
        document.getElementById('h1').style.width = Math.max(0, hp1) + "%";
        document.getElementById('h2').style.width = Math.max(0, hp2) + "%";
        document.getElementById('s1').style.width = sp1 + "%";
        document.getElementById('s2').style.width = sp2 + "%";

        const u1 = document.getElementById('btn-1-ult'), u2 = document.getElementById('btn-2-ult');
        if (sp1 >= 100) u1.classList.add('ult-ready'); else u1.classList.remove('ult-ready');
        if (sp2 >= 100) u2.classList.add('ult-ready'); else u2.classList.remove('ult-ready');

        if (hp1 <= 0 || hp2 <= 0) {
            document.getElementById('win-overlay').style.display = 'flex';
            document.getElementById('win-text').innerText = hp1 <= 0 ? p2c.n + " KAZANDI!" : p1c.n + " KAZANDI!";
        }
    }

    setupSelection();
</script>
</body>
</html>
