<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tom Savaşları Online - Emoji Edition</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

    <style>
        body { margin: 0; font-family: 'Segoe UI', Arial, sans-serif; background: #000; color: #fff; touch-action: none; user-select: none; overflow: hidden; }
        
        #top-bar { position: fixed; top: 0; width: 100%; background: #222; z-index: 2000; padding: 5px 0; border-bottom: 2px solid #f39c12; text-align: center; }
        #progress-bg { width: 70%; height: 8px; background: #444; margin: 4px auto; border-radius: 4px; }
        #progress-fill { height: 100%; width: 0%; background: #f1c40f; transition: 0.5s; border-radius: 4px; }

        #menu, #shop, #selection { position: fixed; inset: 0; z-index: 3000; display: flex; flex-direction: column; align-items: center; justify-content: center; background: radial-gradient(circle, #1a2a6c, #000); }
        #selection { display: none; padding-top: 70px; overflow-y: auto; justify-content: flex-start; background: #111; }
        
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 95%; padding-bottom: 20px; }
        .item { background: #222; border: 2px solid #444; border-radius: 10px; height: 110px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 40px; }
        .locked { filter: grayscale(1) brightness(0.3); }

        #arena { height: 48vh; background-color: #1a1a2a; background-image: radial-gradient(circle at 50% 50%, rgba(30, 50, 150, 0.4), #000 90%); position: relative; display: none; align-items: flex-end; justify-content: center; border-bottom: 4px solid #000; }
        .hud { position: absolute; top: 60px; width: 92%; display: flex; justify-content: space-between; z-index: 10; }
        .bar-wrap { width: 130px; background: rgba(0,0,0,0.6); padding: 5px; border-radius: 6px; }
        .b-bg { width: 100%; height: 14px; background: #333; border-radius: 7px; overflow: hidden; position: relative; }
        .hp-f { height: 100%; background: linear-gradient(#4cd137, #44bd32); width: 100%; transition: 0.3s; }
        .hp-critical { background: linear-gradient(#e74c3c, #c0392b) !important; }

        #ctrl { height: 52vh; display: none; }
        .side { flex: 1; display: flex; flex-direction: column; }
        .atk-btn { flex: 1; background: #1a2a6c; color: #fff; font-size: 26px; font-weight: bold; border: 1px solid #000; outline: none; }
        
        .btn { width: 220px; padding: 15px; margin: 8px; border-radius: 30px; border: none; font-weight: bold; font-size: 18px; box-shadow: 0 4px #000; }
        .input-name { padding: 12px; border-radius: 15px; border: 2px solid #f39c12; width: 200px; text-align: center; margin-bottom: 10px; font-weight: bold; }
        .char-emoji { font-size: 80px; position: absolute; bottom: 15px; transition: 0.1s; }
    </style>
</head>
<body>

<div id="top-bar">
    <div style="color:#f1c40f; font-weight:bold;">🏆 <span id="k-txt">0</span></div>
    <div id="progress-bg"><div id="progress-fill"></div></div>
</div>

<div id="menu">
    <h1 style="margin-bottom:10px; text-shadow: 2px 2px #000;">TOM ONLINE 🎮</h1>
    <input type="text" id="playerNameInput" class="input-name" placeholder="İsmini Yaz..." maxlength="10">
    <button class="btn" style="background:#2ecc71" onclick="openS('bot')">🤖 TEK OYUNCU</button>
    <button class="btn" style="background:#3498db" onclick="openS('create')">🏠 ODA KUR</button>
    <button class="btn" style="background:#9b59b6" onclick="openS('join')">🔑 ODAYA KATIL</button>
    <button class="btn" style="background:#f1c40f; color:#000;" onclick="openShop()">🏪 DÜKKAN</button>
</div>

<div id="shop" style="display:none">
    <div style="font-size:80px; margin-bottom:20px;">🎁</div>
    <button class="btn" style="background:#2ecc71" onclick="buyB()">1000 🏆 MEGA KUTU</button>
    <button class="btn" style="background:#444" onclick="closeShop()">GERİ</button>
</div>

<div id="selection"><div class="grid" id="grid"></div></div>

<div id="arena">
    <div class="hud">
        <div class="bar-wrap">
            <div class="b-bg"><div id="h1" class="hp-f"></div></div>
            <span id="display-name1" style="font-size:12px; font-weight:bold; color:#f1c40f;"></span>
        </div>
        <div class="bar-wrap" style="text-align:right">
            <div class="b-bg"><div id="h2" class="hp-f"></div></div>
            <span id="display-name2" style="font-size:12px; font-weight:bold; color:#f1c40f;"></span>
        </div>
    </div>
    <div id="char1" class="char-emoji" style="left:15%;">🐱</div>
    <div id="char2" class="char-emoji" style="right:15%; transform:scaleX(-1);">🐶</div>
</div>

<div id="ctrl">
    <div class="side"><button class="atk-btn" onclick="hitRequest()">⚡ ATAK YAP!</button></div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://tomoyunu-5cd2f-default-rtdb.europe-west1.firebasedatabase.app/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // KARAKTER EMOJİLERİ
    const charMap = {
        "Tom": "🐱", "Angela": "🐈", "Hank": "🐶", "Becca": "🐰", "Ben": "🐕",
        "Ginger": "🐱‍🚀", "Hippo": "🦛", "Ginna": "🦊", "Roy": "🦝", "Gus": "🐷",
        "Flip": "🐸", "Squeak": "🐭", "Blinky": "🐹", "Dot": "🦒", "Sugar": "🦄"
    };
    const chars = Object.keys(charMap);
    
    let kupa = parseInt(localStorage.getItem('kupa')) || 0;
    let unlocked = JSON.parse(localStorage.getItem('unlocked')) || ["Tom","Angela"];
    let playerName = localStorage.getItem('p_name') || "Oyuncu";
    
    document.getElementById('playerNameInput').value = playerName;
    let p1, p2, hp1=100, hp2=100, mode, roomCode, myRole;

    function saveName() {
        let n = document.getElementById('playerNameInput').value;
        if(n) { playerName = n; localStorage.setItem('p_name', n); }
    }

    function openS(m) {
        saveName();
        mode = m; 
        document.getElementById('menu').style.display='none'; 
        document.getElementById('selection').style.display='flex';
        const g = document.getElementById('grid'); g.innerHTML = "";
        chars.forEach(n => {
            let lock = !unlocked.includes(n);
            let d = document.createElement('div'); d.className = 'item' + (lock?' locked':'');
            d.innerHTML = `<span>${charMap[n]}</span><p style="font-size:10px;">${n}</p>`;
            if(!lock) d.onclick = () => { p1=n; handleStart(); };
            g.appendChild(d);
        });
    }

    function handleStart() {
        if(mode === 'bot') {
            p2 = unlocked[Math.floor(Math.random()*unlocked.length)];
            startLocal();
        } else if(mode === 'create') {
            roomCode = Math.floor(1000 + Math.random() * 9000);
            myRole = "p1";
            db.ref('rooms/' + roomCode).set({ 
                p1_hp: 100, p2_hp: 100, p1_char: p1, p1_name: playerName,
                p2_char: "", p2_name: "", status: "waiting" 
            });
            alert("ODA KODUN: " + roomCode);
            listenRoom();
        } else if(mode === 'join') {
            roomCode = prompt("Oda Kodunu Gir:");
            if(!roomCode) return;
            myRole = "p2";
            db.ref('rooms/' + roomCode).update({ p2_char: p1, p2_name: playerName, status: "playing" });
            listenRoom();
        }
    }

    function startLocal() {
        document.getElementById('selection').style.display='none'; 
        document.getElementById('arena').style.display='flex'; 
        document.getElementById('ctrl').style.display='flex';
        document.getElementById('char1').innerText = charMap[p1];
        document.getElementById('char2').innerText = charMap[p2];
        document.getElementById('display-name1').innerText = playerName;
        document.getElementById('display-name2').innerText = "Bot " + p2;
        if(mode === 'bot') setInterval(() => { if(hp1>0 && hp2>0) { hp1 -= 5; upHUD(); checkWin(); } }, 1000);
    }

    function listenRoom() {
        db.ref('rooms/' + roomCode).on('value', (snap) => {
            const data = snap.val(); if(!data) return;
            hp1 = data.p1_hp; hp2 = data.p2_hp;
            upHUD();
            if(data.status === "playing") {
                document.getElementById('selection').style.display='none'; 
                document.getElementById('arena').style.display='flex'; 
                document.getElementById('ctrl').style.display='flex';
                
                if(myRole === "p1") {
                    document.getElementById('display-name1').innerText = data.p1_name;
                    document.getElementById('display-name2').innerText = data.p2_name;
                    p2 = data.p2_char;
                } else {
                    document.getElementById('display-name1').innerText = data.p2_name;
                    document.getElementById('display-name2').innerText = data.p1_name;
                    p2 = data.p1_char;
                }
                document.getElementById('char1').innerText = charMap[p1];
                document.getElementById('char2').innerText = charMap[p2];
            }
            if(hp1 <= 0 || hp2 <= 0) { checkWin(); }
        });
    }

    function hitRequest() {
        // Vuruş efekti (karakter sarsılır)
        const target = (myRole === "p1") ? "char2" : "char1";
        document.getElementById(target).style.transform = "translateX(10px)";
        setTimeout(() => document.getElementById(target).style.transform = "translateX(0)", 50);

        if(mode === 'bot') { hp2 -= 10; upHUD(); checkWin(); return; }
        if(myRole === "p1") db.ref('rooms/' + roomCode).update({ p2_hp: Math.max(0, hp2 - 8) });
        else db.ref('rooms/' + roomCode).update({ p1_hp: Math.max(0, hp1 - 8) });
    }

    function upHUD() {
        const b1 = document.getElementById('h1'), b2 = document.getElementById('h2');
        b1.style.width = hp1 + "%"; b2.style.width = hp2 + "%";
        b1.classList.toggle('hp-critical', hp1 < 30);
        b2.classList.toggle('hp-critical', hp2 < 30);
    }

    function checkWin() {
        if(hp1 <= 0 || hp2 <= 0) {
            let win = (myRole === "p1" && hp2 <= 0) || (myRole === "p2" && hp1 <= 0) || (mode === "bot" && hp2 <= 0);
            if(win) kupa += 100;
            localStorage.setItem('kupa', kupa);
            alert(win ? "KAZANDIN! 🏆 +100 Kupa" : "KAYBETTİN! 💀");
            if(roomCode && myRole === "p1") db.ref('rooms/' + roomCode).remove();
            location.reload();
        }
    }

    function openShop() { document.getElementById('shop').style.display='flex'; }
    function closeShop() { document.getElementById('shop').style.display='none'; }
    function buyB() {
        if(kupa >= 1000) {
            kupa -= 1000;
            let won = chars.filter(x => !unlocked.includes(x))[0];
            if(won) unlocked.push(won);
            localStorage.setItem('kupa', kupa);
            localStorage.setItem('unlocked', JSON.stringify(unlocked));
            alert("Kutudan " + won + " Çıktı! 🎉");
            location.reload();
        } else alert("Yetersiz Kupa! ❌");
    }
    document.getElementById('k-txt').innerText = kupa;
</script>
</body>
</html>
