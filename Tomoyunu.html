<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tom ve Arkadaşları - Full Versiyon</title>
    <style>
        body { margin: 0; font-family: 'Segoe UI', Arial, sans-serif; background: #111; color: white; touch-action: none; user-select: none; overflow: hidden; }

        /* ANA MENÜ */
        #main-menu {
            position: fixed; inset: 0;
            background: linear-gradient(135deg, #1f4037 0%, #99f2c8 100%);
            z-index: 3000; display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        .menu-btn {
            width: 80%; max-width: 300px; padding: 15px; margin: 10px;
            font-size: 20px; font-weight: bold; color: white;
            background: #2c3e50; border: 3px solid #fff; border-radius: 30px;
        }

        /* SEÇİM EKRANI */
        #selection-screen { 
            position: fixed; inset: 0; background: #1a2a3a; z-index: 2000; 
            padding: 20px; text-align: center; display: none; flex-direction: column; align-items: center; overflow-y: auto; 
        }
        .char-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 100%; max-width: 400px; margin-top: 10px; }
        .char-item { background: rgba(255,255,255,0.1); padding: 8px; border-radius: 12px; border: 2px solid #444; }
        .char-item img { width: 100%; aspect-ratio: 1; border-radius: 8px; object-fit: cover; background: #222; }
        .char-item p { margin: 5px 0 0; font-size: 12px; font-weight: bold; }

        /* ARENA */
        #arena { width: 100%; height: 50vh; background: radial-gradient(circle, #2c3e50, #000); position: relative; display: flex; justify-content: center; align-items: flex-end; border-bottom: 3px solid #fff; }
        .hud { position: absolute; top: 20px; width: 90%; display: flex; justify-content: space-between; }
        .bar-container { width: 140px; height: 15px; background: #000; border: 2px solid #fff; border-radius: 10px; overflow: hidden; margin-top: 5px; }
        .hp-fill { height: 100%; width: 100%; background: #2ecc71; transition: 0.2s; }
        .sp-fill { height: 100%; width: 0%; background: #f1c40f; transition: 0.2s; }

        .char-container { position: absolute; bottom: 10px; }
        .char-img { width: 130px; height: 130px; object-fit: contain; }
        #p1-wrap { left: 5%; }
        #p2-wrap { right: 5%; transform: scaleX(-1); }

        /* KONTROLLER */
        #controls { height: 50vh; display: flex; background: #000; }
        .p-area { flex: 1; display: flex; flex-direction: column; }
        .atk-btn { flex: 3; background: #1a2a6c; color: white; font-size: 24px; font-weight: bold; border: 1px solid #333; }
        .ult-btn { flex: 1.5; background: #333; color: white; font-size: 16px; opacity: 0.5; border: 1px solid #444; }
        .ult-ready { background: #e74c3c !important; opacity: 1 !important; box-shadow: inset 0 0 15px #fff; }

        /* ANİMASYONLAR */
        .anim-1 { animation: hitL 0.2s; }
        .anim-2 { animation: hitR 0.2s; }
        @keyframes hitL { 50% { transform: translateX(50px); } }
        @keyframes hitR { 
            0% { transform: scaleX(-1) translateX(0); }
            50% { transform: scaleX(-1) translateX(50px); }
            100% { transform: scaleX(-1) translateX(0); }
        }

        #win-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 4000; display: none; flex-direction: column; justify-content: center; align-items: center; }
    </style>
</head>
<body>

<div id="main-menu">
    <h1 style="font-size: 32px;">Tom ve Arkadaşları</h1>
    <button class="menu-btn" onclick="openSelection(true)">1 OYUNCULU MOD</button>
    <button class="menu-btn" onclick="openSelection(false)">2 OYUNCULU MOD</button>
</div>

<div id="selection-screen">
    <h2 id="sel-title">KARAKTERİNİ SEÇ</h2>
    <div class="char-grid" id="grid"></div>
    <button id="start-btn" onclick="startMatch()" style="display:none; margin-top:20px; padding:10px 30px; background:#2ecc71; color:#fff; border-radius:20px; border:none; font-weight:bold;">SAVAŞI BAŞLAT</button>
</div>

<div id="arena">
    <div class="hud">
        <div><div id="n1" style="font-size:12px;">P1</div><div class="bar-container"><div id="h1" class="hp-fill"></div></div><div class="bar-container"><div id="s1" class="sp-fill"></div></div></div>
        <div style="text-align:right"><div id="n2" style="font-size:12px;">P2</div><div class="bar-container"><div id="h2" class="hp-fill"></div></div><div class="bar-container"><div id="s2" class="sp-fill"></div></div></div>
    </div>
    <div id="p1-wrap" class="char-container"><img id="img1" class="char-img"></div>
    <div id="p2-wrap" class="char-container"><img id="img2" class="char-img"></div>
</div>

<div id="controls">
    <div class="p-area"><button class="atk-btn" id="btn-1-atk">SALDIRI</button><button class="ult-btn" id="btn-1-ult">ULTİ</button></div>
    <div class="p-area" id="p2-ctrl"><button class="atk-btn" id="btn-2-atk" style="background:#b21f1f;">SALDIRI</button><button class="ult-btn" id="btn-2-ult">ULTİ</button></div>
</div>

<div id="win-overlay"><h1 id="win-text">KAZANDIN!</h1><button onclick="location.reload()" style="padding:10px 20px; background:#f39c12; color:#fff; border:none; border-radius:10px;">Tekrar Oyna</button></div>

<script>
    const chars = [
        {n: "Tom", e: "tom.jpg", p: 14, u: "PENÇE"}, {n: "Angela", e: "angela.jpg", p: 11, u: "ŞİFA"},
        {n: "Hank", e: "hank.jpg", p: 12, u: "KEMİK"}, {n: "Ginger", e: "ginger.jpg", p: 13, u: "FİŞEK"},
        {n: "Ben", e: "ben.jpg", p: 13, u: "İCAT"}, {n: "Becca", e: "becca.jpg", p: 12, u: "ROCK"},
        {n: "Roy", e: "roy.jpg", p: 15, u: "SOYGUN"}, {n: "Hippo", e: "hippo.jpg", p: 14, u: "AĞIR"},
        {n: "Ginna", e: "ginna.jpg", p: 10, u: "BOYUN"}, {n: "Gus", e: "gus.jpg", p: 16, u: "KABUS"},
        {n: "Flip", e: "flip.jpg", p: 12, u: "AKIL"}, {n: "Squeak", e: "squeak.jpg", p: 13, u: "ÇIĞLIK"},
        {n: "Blinky", e: "blinky.jpg", p: 14, u: "GÖZ"}, {n: "Dot", e: "dot.jpg", p: 13, u: "IŞIK"},
        {n: "Sugar", e: "sugar.jpg", p: 12, u: "ŞEKER"}
    ];

    let p1c = null, p2c = null, hp1 = 200, hp2 = 200, sp1 = 0, sp2 = 0, isBot = false, botInterval;

    function setup() {
        const grid = document.getElementById('grid');
        chars.forEach((c, i) => {
            let d = document.createElement('div');
            d.className = 'char-item';
            d.innerHTML = `<img src="${c.e}"><p>${c.n}</p>`;
            d.onclick = () => select(i);
            grid.appendChild(d);
        });
    }

    function openSelection(bot) {
        isBot = bot;
        document.getElementById('main-menu').style.display = 'none';
        document.getElementById('selection-screen').style.display = 'flex';
    }

    function select(i) {
        if (!p1c) {
            p1c = chars[i];
            if (isBot) {
                p2c = chars[Math.floor(Math.random() * chars.length)];
                document.getElementById('start-btn').style.display = 'block';
            } else {
                document.getElementById('sel-title').innerText = "2. OYUNCU SEÇ";
            }
        } else if (!p2c && !isBot) {
            p2c = chars[i];
            document.getElementById('start-btn').style.display = 'block';
        }
    }

    function startMatch() {
        document.getElementById('selection-screen').style.display = 'none';
        document.getElementById('img1').src = p1c.e; document.getElementById('img2').src = p2c.e;
        document.getElementById('n1').innerText = p1c.n; document.getElementById('n2').innerText = p2c.n + (isBot ? " (BOT)" : "");
        document.getElementById('btn-1-ult').innerText = p1c.u; document.getElementById('btn-2-ult').innerText = p2c.u;

        if (isBot) {
            document.getElementById('p2-ctrl').style.opacity = "0.2";
            document.getElementById('p2-ctrl').style.pointerEvents = "none";
            botInterval = setInterval(() => {
                if (hp1 <= 0 || hp2 <= 0) return;
                if (Math.random() < 0.1) return; // Ara sıra duraksama
                sp2 >= 100 ? action(2, 'ult') : action(2, 'atk');
            }, 350); // Hızlı bot!
        }

        const controls = [
            {id:'btn-1-atk', p:1, t:'atk'}, {id:'btn-1-ult', p:1, t:'ult'},
            {id:'btn-2-atk', p:2, t:'atk'}, {id:'btn-2-ult', p:2, t:'ult'}
        ];
        controls.forEach(c => {
            const btn = document.getElementById(c.id);
            btn.addEventListener('touchstart', (e) => { e.preventDefault(); action(c.p, c.t); });
            btn.addEventListener('mousedown', () => action(c.p, c.t));
        });
    }

    function action(p, type) {
        if (hp1 <= 0 || hp2 <= 0) return;
        if (type === 'atk') {
            if (p === 1) { hp2 -= p1c.p; sp1 = Math.min(100, sp1 + 20); anim(1); }
            else { hp1 -= p2c.p; sp2 = Math.min(100, sp2 + 20); anim(2); }
        } else if ((p === 1 && sp1 >= 100) || (p === 2 && sp2 >= 100)) {
            let attacker = p === 1 ? p1c : p2c;
            if (attacker.n === "Angela") { p === 1 ? hp1 = Math.min(200, hp1 + 50) : hp2 = Math.min(200, hp2 + 50); }
            else { p === 1 ? hp2 -= 45 : hp1 -= 45; }
            p === 1 ? sp1 = 0 : sp2 = 0;
            anim(p);
        }
        update();
    }

    function anim(p) {
        const wrap = document.getElementById('p' + p + '-wrap');
        wrap.classList.remove('anim-1', 'anim-2');
        void wrap.offsetWidth;
        wrap.classList.add('anim-' + p);
    }

    function update() {
        document.getElementById('h1').style.width = (hp1 / 2) + "%";
        document.getElementById('h2').style.width = (hp2 / 2) + "%";
        document.getElementById('s1').style.width = sp1 + "%";
        document.getElementById('s2').style.width = sp2 + "%";
        document.getElementById('btn-1-ult').className = sp1 >= 100 ? "ult-btn ult-ready" : "ult-btn";
        document.getElementById('btn-2-ult').className = sp2 >= 100 ? "ult-btn ult-ready" : "ult-btn";
        if (hp1 <= 0 || hp2 <= 0) {
            clearInterval(botInterval);
            document.getElementById('win-overlay').style.display = 'flex';
            document.getElementById('win-text').innerText = hp1 <= 0 ? p2c.n + " KAZANDI!" : p1c.n + " KAZANDI!";
        }
    }
    setup();
</script>
</body>
</html>
