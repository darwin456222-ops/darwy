<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tom Savaşları - Resim Yüklemeli</title>
    <style>
        body { margin: 0; font-family: sans-serif; background: #111; color: #fff; touch-action: none; user-select: none; overflow: hidden; }
        
        /* Resim Hazırlama Ekranı */
        #setup-screen { position: fixed; inset: 0; background: #222; z-index: 6000; overflow-y: auto; padding: 20px; text-align: center; }
        .upload-row { display: flex; justify-content: space-between; align-items: center; background: #333; margin: 5px; padding: 10px; border-radius: 8px; }
        
        /* Ana Menü */
        #menu { position: fixed; inset: 0; background: #1a2a6c; z-index: 5000; display: none; flex-direction: column; justify-content: center; align-items: center; }
        .btn { width: 250px; padding: 20px; margin: 10px; border-radius: 50px; border: none; font-weight: bold; font-size: 18px; cursor: pointer; }

        /* Seçim Ekranı */
        #selection { position: fixed; inset: 0; background: #111; z-index: 4000; display: none; flex-direction: column; align-items: center; padding: 10px; overflow-y: auto; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; width: 100%; max-width: 400px; }
        .item { background: #222; border: 2px solid #444; border-radius: 10px; padding: 5px; text-align: center; }
        .item img { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 5px; }

        /* Savaş Alanı */
        #arena { height: 45vh; background: radial-gradient(circle, #004e92, #000); position: relative; border-bottom: 2px solid #fff; }
        .hp-bar { width: 120px; height: 15px; background: #333; border: 1px solid #fff; }
        .hp-fill { height: 100%; background: #0f0; width: 100%; }
        .player-img { width: 110px; height: 110px; object-fit: contain; }

        /* Kontroller */
        #ctrl { height: 55vh; display: flex; }
        .side { flex: 1; display: flex; flex-direction: column; }
        .atk { flex: 3; background: #1a2a6c; color: #fff; font-size: 24px; border: 1px solid #000; }
        .ult { flex: 1; background: #444; color: #fff; opacity: 0.3; }
        .ready { opacity: 1; background: #f00 !important; }
    </style>
</head>
<body>

<div id="setup-screen">
    <h2>Önce Resimleri Seç</h2>
    <p>Telefonundaki fotoğrafları isimlerine göre eşleştir:</p>
    <div id="upload-list"></div>
    <button class="btn" style="background:#2ecc71; width: 100%;" onclick="finishSetup()">OYUNA BAŞLA</button>
</div>

<div id="menu">
    <h1>TOM & FRIENDS</h1>
    <button class="btn" style="background:#2ecc71" onclick="go(true)">1 OYUNCULU (BOT)</button>
    <button class="btn" style="background:#3498db" onclick="go(false)">2 OYUNCULU</button>
</div>

<div id="selection">
    <h2 id="msg">KARAKTER SEÇ</h2>
    <div class="grid" id="grid"></div>
</div>

<div id="arena">
    <div style="position:absolute; top:10px; width:100%; display:flex; justify-content:space-around;">
        <div>HP<div class="hp-bar"><div id="h1" class="hp-fill"></div></div><b id="n1"></b></div>
        <div style="text-align:right">HP<div class="hp-bar"><div id="h2" class="hp-fill"></div></div><b id="n2"></b></div>
    </div>
    <img id="m1" class="player-img" style="position:absolute; bottom:10px; left:10%;">
    <img id="m2" class="player-img" style="position:absolute; bottom:10px; right:10%; transform:scaleX(-1);">
</div>

<div id="ctrl">
    <div class="side"><button class="atk" id="a1">ATAK</button><button class="ult" id="u1">ULTİ</button></div>
    <div class="side" id="p2c"><button class="atk" id="a2" style="background:#800">ATAK</button><button class="ult" id="u2">ULTİ</button></div>
</div>

<script>
    const names = ["Tom", "Angela", "Hank", "Ginger", "Ben", "Becca", "Roy", "Hippo", "Ginna", "Gus", "Flip", "Squeak", "Blinky", "Dot", "Sugar"];
    let images = {}; // Resimlerin verilerini burada tutacağız
    let p1=null, p2=null, hp1=100, hp2=100, sp1=0, sp2=0, isBot=false, bInt;

    // Yükleme listesini oluştur
    const list = document.getElementById('upload-list');
    names.forEach(name => {
        let row = document.createElement('div');
        row.className = 'upload-row';
        row.innerHTML = `<span>${name}:</span> <input type="file" accept="image/*" onchange="handleFile(event, '${name}')">`;
        list.appendChild(row);
    });

    function handleFile(event, name) {
        const file = event.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (e) => { images[name] = e.target.result; };
            reader.readAsDataURL(file);
        }
    }

    function finishSetup() {
        document.getElementById('setup-screen').style.display = 'none';
        document.getElementById('menu').style.display = 'flex';
        buildGrid();
    }

    function buildGrid() {
        const g = document.getElementById('grid');
        names.forEach(name => {
            let d = document.createElement('div');
            d.className = 'item';
            // Eğer resim seçildiyse onu göster, seçilmediyse gri kutu
            let imgTag = images[name] ? `<img src="${images[name]}">` : `<div style="height:80px; background:#444"></div>`;
            d.innerHTML = `${imgTag}<p>${name}</p>`;
            d.onclick = () => {
                if(!p1) {
                    p1 = name;
                    if(isBot) { p2 = names[Math.floor(Math.random()*names.length)]; startGame(); }
                    else { document.getElementById('msg').innerText = "2. OYUNCU SEÇ"; }
                } else if(!p2) { p2 = name; startGame(); }
            };
            g.appendChild(d);
        });
    }

    function go(bot) { isBot=bot; document.getElementById('menu').style.display='none'; document.getElementById('selection').style.display='flex'; }

    function startGame() {
        document.getElementById('selection').style.display='none';
        document.getElementById('m1').src = images[p1] || "";
        document.getElementById('m2').src = images[p2] || "";
        document.getElementById('n1').innerText = p1;
        document.getElementById('n2').innerText = p2 + (isBot ? " (BOT)" : "");

        if(isBot) {
            document.getElementById('p2c').style.opacity = "0.2";
            // BOT ÇILGINLAR GİBİ BASIYOR (100ms)
            bInt = setInterval(() => {
                if(hp1<=0 || hp2<=0) return;
                sp2 >= 100 ? hit(2, 'u') : hit(2, 'a');
            }, 100);
        }

        const setupBtn = (id, p, t) => {
            let btn = document.getElementById(id);
            btn.onclick = () => hit(p, t);
            btn.ontouchstart = (e) => { e.preventDefault(); hit(p, t); };
        };
        setupBtn('a1', 1, 'a'); setupBtn('u1', 1, 'u');
        setupBtn('a2', 2, 'a'); setupBtn('u2', 2, 'u');
    }

    function hit(p, t) {
        if(hp1<=0 || hp2<=0) return;
        if(t==='a') {
            if(p===1) { hp2-=5; sp1=Math.min(100, sp1+10); }
            else { hp1-=5; sp2=Math.min(100, sp2+10); }
        } else if((p===1 && sp1>=100) || (p===2 && sp2>=100)) {
            if(p===1) { hp2-=25; sp1=0; } else { hp1-=25; sp2=0; }
        }
        
        document.getElementById('h1').style.width = hp1+"%";
        document.getElementById('h2').style.width = hp2+"%";
        document.getElementById('u1').classList.toggle('ready', sp1>=100);
        document.getElementById('u2').classList.toggle('ready', sp2>=100);

        if(hp1<=0 || hp2<=0) {
            clearInterval(bInt);
            alert(hp1<=0 ? "BOT KAZANDI!" : "SEN KAZANDIN!");
            location.reload();
        }
    }
</script>
</body>
</html>
