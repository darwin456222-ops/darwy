<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Arena of Pets: Ultimate</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

    <style>
        :root { --accent: #00d2ff; --bg: #121212; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #fff; overflow: hidden; }
        
        #nav { position: fixed; top: 0; width: 100%; height: 60px; background: #1e1e1e; display: flex; justify-content: center; align-items: center; border-bottom: 2px solid var(--accent); z-index: 1000; }
        .currency { font-size: 20px; font-weight: bold; color: #fbc531; }

        .page { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 2000; background: var(--bg); padding-top: 60px; }
        
        /* Karakter Kartları */
        .hero-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; width: 90%; padding: 20px 0; overflow-y: auto; }
        .hero-card { background: #252525; border-radius: 15px; padding: 10px; border: 2px solid #333; text-align: center; }
        .hero-card img { width: 100%; height: 100px; object-fit: cover; border-radius: 10px; margin-bottom: 8px; }
        .hero-card.locked { opacity: 0.3; filter: grayscale(1); }
        .hero-name { font-size: 14px; color: var(--accent); font-weight: bold; }

        /* Savaş Alanı Görselleri */
        .battle-view { flex: 1; position: relative; width: 100%; display: flex; align-items: flex-end; justify-content: space-around; padding-bottom: 60px; }
        .char-img { width: 120px; height: 120px; object-fit: contain; transition: 0.2s; }
        
        .hp-container { position: absolute; top: 80px; width: 90%; display: flex; justify-content: space-between; }
        .hp-bar { width: 45%; height: 12px; background: #333; border-radius: 6px; overflow: hidden; border: 1px solid #000; }
        .hp-fill { height: 100%; background: #4cd137; width: 100%; transition: 0.3s; }

        #actions { height: 140px; width: 100%; background: #1a1a1a; display: none; align-items: center; justify-content: space-around; padding: 0 15px; border-top: 2px solid #333; }
        .btn-game { flex: 1; margin: 0 5px; height: 60px; border-radius: 12px; border: none; font-weight: bold; color: #fff; font-size: 16px; }
        .atk { background: #e84118; box-shadow: 0 4px #800; }
        
        .btn-menu { width: 240px; padding: 15px; margin: 8px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div id="nav">
    <div class="currency">🪙 <span id="gold-txt">0</span></div>
</div>

<div id="home" class="page">
    <h1 style="color: var(--accent);">ARENA OF PETS</h1>
    <button class="btn-menu" style="background:var(--accent);" onclick="openSelection()">OYUNA BAŞLA</button>
    <button class="btn-menu" style="background:#fbc531;" onclick="toggleShop(true)">SANDIK AÇ (500 🪙)</button>
</div>

<div id="shop" class="page" style="display:none;">
    <h2>GİZEMLİ SANDIK</h2>
    <p>Yeni bir karakter çıkart!</p>
    <button class="btn-menu" style="background:#fbc531;" onclick="buyChest()">500 🪙 AÇ</button>
    <button class="btn-menu" style="background:#444; color:#fff;" onclick="toggleShop(false)">GERİ</button>
</div>

<div id="selection" class="page" style="display:none; justify-content: flex-start;">
    <button class="btn-menu" style="background:#333; color:#fff; width:90%;" onclick="location.reload()">İPTAL</button>
    <div class="hero-grid" id="hero-list"></div>
</div>

<div id="arena" class="page" style="display:none;">
    <div class="hp-container">
        <div class="hp-bar"><div id="hp-p1" class="hp-fill"></div></div>
        <div class="hp-bar"><div id="hp-p2" class="hp-fill"></div></div>
    </div>
    <div class="battle-view">
        <img id="p1-img" class="char-img" src="">
        <img id="p2-img" class="char-img" src="" style="transform: scaleX(-1);">
    </div>
</div>

<div id="actions">
    <button class="btn-game atk" onclick="doAttack()">SALDIRI</button>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://tomoyunu-5cd2f-default-rtdb.europe-west1.firebasedatabase.app/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Senin Yüklediğin Fotoğraflara Göre Karakterler
    const PETS = {
        "Sunny": { img: "sunny.jpg", hp: 120, dmg: 10 },
        "Browny": { img: "browny.jpg", hp: 110, dmg: 12 },
        "Pinky": { img: "pinky.jpg", hp: 100, dmg: 14 },
        "Sleapy": { img: "sleapy.jpg", hp: 150, dmg: 8 },
        "Dinory": { img: "dinory.jpg", hp: 180, dmg: 7 },
        "Stary": { img: "stary.jpg", hp: 90, dmg: 18 }
    };

    let gold = parseInt(localStorage.getItem('pet_gold_v2')) || 0;
    let unlocked = JSON.parse(localStorage.getItem('pet_unl_v2')) || ["Sunny", "Browny"];
    let myPet, enemyPet, isPlaying = false, p1HP, p2HP, m1, m2;

    function sync() {
        document.getElementById('gold-txt').innerText = gold;
        localStorage.setItem('pet_gold_v2', gold);
        localStorage.setItem('pet_unl_v2', JSON.stringify(unlocked));
    }
    sync();

    function openSelection() {
        document.getElementById('home').style.display = 'none';
        document.getElementById('selection').style.display = 'flex';
        const list = document.getElementById('hero-list');
        list.innerHTML = "";
        
        Object.keys(PETS).forEach(name => {
            const locked = !unlocked.includes(name);
            const card = document.createElement('div');
            card.className = `hero-card ${locked ? 'locked' : ''}`;
            card.innerHTML = `<img src="${PETS[name].img}"><div class="hero-name">${name}</div>`;
            if(!locked) card.onclick = () => startBattle(name);
            list.appendChild(card);
        });
    }

    function startBattle(name) {
        myPet = name;
        const keys = Object.keys(PETS);
        enemyPet = keys[Math.floor(Math.random()*keys.length)];
        
        document.getElementById('selection').style.display = 'none';
        document.getElementById('arena').style.display = 'flex';
        document.getElementById('actions').style.display = 'flex';
        
        document.getElementById('p1-img').src = PETS[myPet].img;
        document.getElementById('p2-img').src = PETS[enemyPet].img;
        
        p1HP = PETS[myPet].hp; m1 = p1HP;
        p2HP = PETS[enemyPet].hp; m2 = p2HP;
        isPlaying = true;
        updateBars();
        
        const bot = setInterval(() => {
            if(!isPlaying) return clearInterval(bot);
            p1HP -= (PETS[enemyPet].dmg - 2);
            updateBars();
            if(p1HP <= 0) finalize(false);
        }, 2500);
    }

    function doAttack() {
        if(!isPlaying) return;
        p2HP -= PETS[myPet].dmg;
        document.getElementById('p2-img').style.transform = "scaleX(-1) translateX(-20px)";
        setTimeout(() => document.getElementById('p2-img').style.transform = "scaleX(-1)", 100);
        updateBars();
        if(p2HP <= 0) finalize(true);
    }

    function updateBars() {
        document.getElementById('hp-p1').style.width = (p1HP/m1*100) + "%";
        document.getElementById('hp-p2').style.width = (p2HP/m2*100) + "%";
    }

    function finalize(win) {
        isPlaying = false;
        if(win) { gold += 100; sync(); alert("TEBRİKLER! +100 🪙"); }
        else alert("YENİLDİN!");
        location.reload();
    }

    function toggleShop(s) {
        document.getElementById('shop').style.display = s ? 'flex' : 'none';
        document.getElementById('home').style.display = s ? 'none' : 'flex';
    }

    function buyChest() {
        if(gold < 500) return alert("Yetersiz altın!");
        const lockeds = Object.keys(PETS).filter(p => !unlocked.includes(p));
        if(lockeds.length === 0) return alert("Tüm karakterler açık!");
        
        gold -= 500;
        const prize = lockeds[Math.floor(Math.random()*lockeds.length)];
        unlocked.push(prize);
        sync();
        alert("YENİ KARAKTER: " + prize);
        location.reload();
    }
</script>
</body>
</html>
