<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🐱 Tom Savaşları Online ⚔️</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

    <style>
        body { margin: 0; font-family: sans-serif; background: #000; color: #fff; overflow: hidden; touch-action: none; }
        #top-bar { position: fixed; top: 0; width: 100%; background: #222; padding: 10px 0; border-bottom: 3px solid #f39c12; text-align: center; z-index: 1000; }
        
        /* Menü ve Seçim Ekranı */
        #menu, #selection { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #1a2a6c; z-index: 2000; }
        #selection { display: none; background: #111; overflow-y: auto; padding-top: 80px; }

        /* Karakter Kutuları */
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 90%; }
        .item { background: #333; border-radius: 10px; padding: 10px; text-align: center; border: 2px solid #555; }
        .item img { width: 100%; height: auto; border-radius: 5px; background: #444; min-height: 60px; }
        .locked { opacity: 0.4; filter: grayscale(1); }

        /* Savaş Alanı */
        #arena { height: 50vh; display: none; position: relative; background: linear-gradient(#000428, #004e92); align-items: flex-end; justify-content: center; }
        .char-box { width: 120px; height: 120px; position: absolute; bottom: 20px; transition: 0.1s; }
        .char-box img { width: 100%; height: 100%; object-fit: contain; }

        /* HUD ve Butonlar */
        .hud { position: absolute; top: 70px; width: 90%; display: flex; justify-content: space-between; }
        .hp-bar { width: 120px; height: 15px; background: #444; border-radius: 10px; overflow: hidden; border: 1px solid #fff; }
        .hp-fill { height: 100%; background: #2ecc71; width: 100%; transition: 0.3s; }
        
        #ctrl { height: 50vh; display: none; background: #000; }
        .atk-btn { width: 100%; height: 100%; background: #c0392b; color: #fff; font-size: 30px; font-weight: bold; border: none; }
        
        .btn { padding: 15px 30px; margin: 10px; border-radius: 25px; border: none; font-weight: bold; font-size: 18px; cursor: pointer; }
    </style>
</head>
<body>

<div id="top-bar">🏆 Kupa: <span id="kupa-txt">0</span></div>

<div id="menu">
    <h1>TOM SAVAŞLARI ⚔️</h1>
    <button class="btn" style="background:#2ecc71" onclick="startApp('bot')">🤖 BOT İLE OYNA</button>
    <button class="btn" style="background:#3498db" onclick="startApp('create')">🏠 ODA KUR</button>
    <button class="btn" style="background:#9b59b6" onclick="startApp('join')">🔑 ODAYA KATIL</button>
</div>

<div id="selection">
    <h2>KARAKTER SEÇ 👤</h2>
    <div class="grid" id="char-grid"></div>
</div>

<div id="arena">
    <div class="hud">
        <div><div class="hp-bar"><div id="hp1" class="hp-fill"></div></div><small id="n1"></small></div>
        <div><div class="hp-bar"><div id="hp2" class="hp-fill"></div></div><small id="n2"></small></div>
    </div>
    <div class="char-box" style="left:10%" id="box1"><img id="img1"></div>
    <div class="char-box" style="right:10%; transform: scaleX(-1);" id="box2"><img id="img2"></div>
</div>

<div id="ctrl">
    <button class="atk-btn" onclick="attack()">💥 VUR!</button>
</div>

<script>
    // FİREBASE YAPILANDIRMASI
    const conf = { databaseURL: "https://tomoyunu-5cd2f-default-rtdb.europe-west1.firebasedatabase.app/" };
    firebase.initializeApp(conf);
    const db = firebase.database();

    // KARAKTER LİSTESİ (KÜÇÜK HARF ÖNEMLİ!)
    const allChars = ["Tom", "Angela", "Hank", "Becca", "Ben", "Ginger"];
    let myKupa = parseInt(localStorage.getItem('kupa')) || 0;
    let unlocked = JSON.parse(localStorage.getItem('unlocked')) || ["Tom", "Angela"];
    
    let mode, myChar, enemyChar, roomID, role;
    let hp1 = 100, hp2 = 100;

    document.getElementById('kupa-txt').innerText = myKupa;

    function startApp(m) {
        mode = m;
        document.getElementById('menu').style.display = 'none';
        document.getElementById('selection').style.display = 'flex';
        
        const grid = document.getElementById('char-grid');
        grid.innerHTML = "";
        
        allChars.forEach(c => {
            let isLocked = !unlocked.includes(c);
            let div = document.createElement('div');
            div.className = "item" + (isLocked ? " locked" : "");
            // ÖNEMLİ: Resim yollarını GitHub'a göre ayarladık
            div.innerHTML = `<img src="${c.toLowerCase()}.jpg" onerror="this.src='https://via.placeholder.com/100?text=${c}'"> <br> ${c}`;
            if(!isLocked) div.onclick = () => selectChar(c);
            grid.appendChild(div);
        });
    }

    function selectChar(c) {
        myChar = c;
        if(mode === 'bot') {
            enemyChar = unlocked[Math.floor(Math.random()*unlocked.length)];
            setupArena();
        } else if(mode === 'create') {
            roomID = Math.floor(1000 + Math.random() * 8999);
            role = 'p1';
            db.ref('rooms/' + roomID).set({
                p1_c: myChar, p1_h: 100, p2_h: 100, status: 'wait'
            });
            alert("Oda Kodun: " + roomID);
            waitOpponent();
        } else {
            roomID = prompt("Oda Kodunu Gir:");
            role = 'p2';
            db.ref('rooms/' + roomID).update({ p2_c: myChar, status: 'play' });
            setupArena();
        }
    }

    function waitOpponent() {
        db.ref('rooms/' + roomID).on('value', s => {
            let d = s.val();
            if(d && d.status === 'play') {
                enemyChar = d.p2_c;
                setupArena();
            }
        });
    }

    function setupArena() {
        document.getElementById('selection').style.display = 'none';
        document.getElementById('arena').style.display = 'flex';
        document.getElementById('ctrl').style.display = 'block';
        
        // Resimleri yükle
        document.getElementById('img1').src = myChar.toLowerCase() + ".jpg";
        if(mode === 'bot') {
            document.getElementById('img2').src = enemyChar.toLowerCase() + ".jpg";
            document.getElementById('n1').innerText = "Sen (" + myChar + ")";
            document.getElementById('n2').innerText = "Bot (" + enemyChar + ")";
            startBotLogic();
        } else {
            listenOnline();
        }
    }

    function listenOnline() {
        db.ref('rooms/' + roomID).on('value', s => {
            let d = s.val();
            if(!d) return;
            hp1 = d.p1_h; hp2 = d.p2_h;
            document.getElementById('hp1').style.width = hp1 + "%";
            document.getElementById('hp2').style.width = hp2 + "%";
            
            if(role === 'p1') {
                document.getElementById('img2').src = d.p2_c.toLowerCase() + ".jpg";
            } else {
                document.getElementById('img2').src = d.p1_c.toLowerCase() + ".jpg";
            }

            if(hp1 <= 0 || hp2 <= 0) endGame(hp1, hp2);
        });
    }

    function attack() {
        if(mode === 'bot') {
            hp2 -= 10;
            document.getElementById('hp2').style.width = hp2 + "%";
            if(hp2 <= 0) endGame(100, 0);
        } else {
            if(role === 'p1') db.ref('rooms/' + roomID).update({ p2_h: Math.max(0, hp2 - 10) });
            else db.ref('rooms/' + roomID).update({ p1_h: Math.max(0, hp1 - 10) });
        }
    }

    function startBotLogic() {
        let timer = setInterval(() => {
            if(hp1 <= 0 || hp2 <= 0) { clearInterval(timer); return; }
            hp1 -= 5;
            document.getElementById('hp1').style.width = hp1 + "%";
            if(hp1 <= 0) endGame(0, 100);
        }, 1500);
    }

    function endGame(h1, h2) {
        let win = (role === 'p1' && h2 <= 0) || (role === 'p2' && h1 <= 0) || (mode === 'bot' && h2 <= 0);
        if(win) {
            myKupa += 50;
            localStorage.setItem('kupa', myKupa);
            alert("TEBRİKLER! KAZANDIN 🏆");
        } else {
            alert("KAYBETTİN! 💀");
        }
        location.reload();
    }
</script>
</body>
</html>
