<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Arena of Pets: Ultimate Battle</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

    <style>
        :root { --accent: #00d2ff; --bg: #121212; --danger: #e84118; --special: #9b59b6; --gold: #fbc531; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #fff; overflow: hidden; height: 100vh; }
        
        #nav { position: fixed; top: 0; width: 100%; height: 60px; background: #1e1e1e; display: flex; justify-content: center; align-items: center; border-bottom: 2px solid var(--accent); z-index: 5000; }
        .currency { font-size: 22px; font-weight: bold; color: var(--gold); }

        .page { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 2000; background: var(--bg); }
        
        /* Arena Düzeni */
        #arena { display: none; background: radial-gradient(circle, #2c3e50, #000); z-index: 3000; flex-direction: column; }
        .battle-view { flex: 1; position: relative; width: 100%; display: flex; align-items: center; justify-content: space-around; padding-bottom: 20px; }
        .char-img { width: 150px; height: 150px; object-fit: contain; transition: 0.1s; z-index: 3001; }
        
        .hp-container { position: absolute; top: 80px; width: 90%; display: flex; justify-content: space-between; z-index: 3005; }
        .hp-bar { width: 45%; height: 16px; background: #333; border-radius: 8px; overflow: hidden; border: 2px solid #000; }
        .hp-fill { height: 100%; background: #4cd137; width: 100%; transition: 0.3s; }

        /* BUTON PANELİ (Düzeltildi) */
        #actions { 
            position: fixed; 
            bottom: 0; 
            left: 0; 
            width: 100%; 
            height: 120px; 
            background: rgba(26, 26, 26, 0.95); 
            display: none; /* JavaScript ile açılacak */
            flex-direction: row; 
            align-items: center; 
            justify-content: center; 
            gap: 15px; 
            padding: 15px; 
            border-top: 3px solid #333; 
            z-index: 6000; /* En üstte durması için */
        }
        .btn-game { flex: 1; height: 80px; border-radius: 15px; border: none; font-weight: 900; color: #fff; font-size: 20px; cursor: pointer; box-shadow: 0 6px 0 rgba(0,0,0,0.3); }
        .atk-btn { background: linear-gradient(#ff4757, var(--danger)); }
        .spec-btn { background: linear-gradient(#a29bfe, var(--special)); }
        .btn-game:active { transform: translateY(4px); box-shadow: none; }
        .btn-game:disabled { background: #444 !important; opacity: 0.5; box-shadow: none; }

        .btn-menu { width: 260px; padding: 18px; margin: 10px; border-radius: 15px; border: none; font-weight: bold; cursor: pointer; font-size: 18px; }
        .hero-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 20px; width: 100%; overflow-y: auto; }
        .hero-card { background: #252525; padding: 10px; border-radius: 15px; text-align: center; border: 2px solid #333; }
        .hero-card img { width: 100%; height: 110px; object-fit: cover; border-radius: 10px; }
    </style>
</head>
<body>

<div id="nav"><div class="currency">🪙 <span id="gold-txt">0</span></div></div>

<div id="home" class="page">
    <h1 style="color: var(--accent); margin-bottom: 20px;">ARENA OF PETS</h1>
    <button class="btn-menu" style="background:var(--accent);" onclick="preStart('solo')">TEK OYUNCU</button>
    <button class="btn-menu" style="background:var(--special); color:white;" onclick="preStart('create')">ODA KUR</button>
    <button class="btn-menu" style="background:#3498db; color:white;" onclick="preStart('join')">KATIL</button>
    <button class="btn-menu" style="background:var(--gold);" onclick="openShop()">🏪 DÜKKAN (KUTU)</button>
</div>

<div id="shop" class="page" style="display:none;">
    <h2 style="color:var(--gold)">EFSANEVİ SANDIK</h2>
    <div style="font-size: 100px; margin: 20px;">🎁</div>
    <button class="btn-menu" style="background:var(--gold);" onclick="buyChest()">1000 🪙 AÇ</button>
    <button class="btn-menu" style="background:#444; color:white;" onclick="closeShop()">GERİ</button>
</div>

<div id="selection" class="page" style="display:none; justify-content: flex-start; padding-top: 80px;">
    <div class="hero-grid" id="hero-list"></div>
</div>

<div id="arena" class="page">
    <div id="room-info" style="position:absolute; top:110px; color:var(--accent); font-weight:bold;"></div>
    <div class="hp-container">
        <div class="hp-bar"><div id="hp-p1" class="hp-fill"></div></div>
        <div class="hp-bar"><div id="hp-p2" class="hp-fill"></div></div>
    </div>
    <div class="battle-view">
        <img id="p1-img" class="char-img" src="">
        <img id="p2-img" class="char-img" src="" style="transform: scaleX(-1);">
    </div>
</div>

<div id="actions">
    <button class="btn-game atk-btn" id="atk-b" onclick="doAttack()">VUR ⚔️</button>
    <button class="btn-game spec-btn" id="s-b" onclick="doSpecial()">SÜPER 🌟</button>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://tomoyunu-5cd2f-default-rtdb.europe-west1.firebasedatabase.app/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const PETS = {
        "Sunny": { img: "sunny.jpg", hp: 120, dmg: 12, sVal: 25 },
        "Pinky": { img: "pinky.jpg", hp: 110, dmg: 14, sVal: 35 },
        "Browny": { img: "browny.jpg", hp: 130, dmg: 13, sVal: 22 },
        "Sleapy": { img: "sleapy.jpg", hp: 180, dmg: 9, sVal: 30 },
        "Stary": { img: "stary.jpg", hp: 95, dmg: 20, sVal: 45 },
        "Dinory": { img: "dinory.jpg", hp: 210, dmg: 8, sVal: 25 }
    };

    let gold = parseInt(localStorage.getItem('pet_gold_v3')) || 0;
    let unlocked = JSON.parse(localStorage.getItem('pet_unl_v3')) || ["Sunny", "Pinky"];
    let myPet, mode, roomID, myRole, isPlaying = false, p1HP, p2HP, m1, m2;

    function sync() {
        document.getElementById('gold-txt').innerText = gold;
        localStorage.setItem('pet_gold_v3', gold);
        localStorage.setItem('pet_unl_v3', JSON.stringify(unlocked));
    }
    sync();

    function preStart(m) {
        mode = m;
        document.getElementById('home').style.display = 'none';
        document.getElementById('selection').style.display = 'flex';
        const list = document.getElementById('hero-list');
        list.innerHTML = "";
        Object.keys(PETS).forEach(name => {
            if(!unlocked.includes(name)) return;
            const card = document.createElement('div');
            card.className = 'hero-card';
            card.innerHTML = `<img src="${PETS[name].img}"><p>${name}</p>`;
            card.onclick = () => {
                myPet = name;
                if(mode === 'solo') startSolo();
                else if(mode === 'create') createRoom();
                else if(mode === 'join') joinRoom();
            };
            list.appendChild(card);
        });
    }

    function uiArena() {
        document.getElementById('selection').style.display = 'none';
        document.getElementById('arena').style.display = 'flex';
        document.getElementById('actions').style.display = 'flex'; // Butonları zorla göster
    }

    function startSolo() {
        uiArena();
        const keys = Object.keys(PETS);
        const enemy = keys[Math.floor(Math.random()*keys.length)];
        p1HP = PETS[myPet].hp; m1 = p1HP;
        p2HP = PETS[enemy].hp; m2 = p2HP;
        document.getElementById('p1-img').src = PETS[myPet].img;
        document.getElementById('p2-img').src = PETS[enemy].img;
        isPlaying = true;
        updateBars();
        setInterval(() => { if(isPlaying) { p1HP -= 9; updateBars(); if(p1HP <= 0) finalize(false); } }, 3000);
    }

    function createRoom() {
        roomID = Math.floor(1000 + Math.random() * 9000);
        myRole = 'p1';
        document.getElementById('room-info').innerText = "ODA: " + roomID;
        db.ref('rooms/' + roomID).set({ p1_hp: PETS[myPet].hp, p1_img: PETS[myPet].img, p2_hp: 0, status: 'waiting' });
        uiArena(); listenRoom();
    }

    function joinRoom() {
        roomID = prompt("Oda Kodu:");
        if(!roomID) return location.reload();
        myRole = 'p2';
        db.ref('rooms/' + roomID).update({ p2_hp: PETS[myPet].hp, p2_img: PETS[myPet].img, status: 'playing' });
        uiArena(); listenRoom();
    }

    function listenRoom() {
        db.ref('rooms/' + roomID).on('value', snap => {
            const d = snap.val(); if(!d) return;
            isPlaying = (d.status === 'playing');
            
            // Butonları oyun durumuna göre aktif/pasif yap
            document.getElementById('atk-b').disabled = !isPlaying;
            document.getElementById('s-b').disabled = !isPlaying;

            if(myRole === 'p1') {
                p1HP = d.p1_hp; p2HP = d.p2_hp;
                m1 = PETS[myPet].hp;
                m2 = d.p2_img ? PETS[Object.keys(PETS).find(k=>PETS[k].img===d.p2_img)].hp : 100;
                if(d.p2_img) document.getElementById('p2-img').src = d.p2_img;
            } else {
                p1HP = d.p2_hp; p2HP = d.p1_hp;
                m1 = PETS[myPet].hp;
                m2 = PETS[Object.keys(PETS).find(k=>PETS[k].img===d.p1_img)].hp;
                document.getElementById('p2-img').src = d.p1_img;
            }
            document.getElementById('p1-img').src = PETS[myPet].img;
            updateBars();
            if(p1HP <= 0) finalize(false);
            if(p2HP <= 0 && isPlaying) finalize(true);
        });
    }

    function doAttack() {
        if(!isPlaying) return;
        const dmg = PETS[myPet].dmg + Math.floor(Math.random()*5);
        applyDmg(p2HP - dmg, p1HP);
        // Vuruş efekti
        const e = document.getElementById('p2-img');
        e.style.filter = "brightness(2) translateX(10px)";
        setTimeout(()=> e.style.filter="none", 100);
    }

    function doSpecial() {
        if(!isPlaying) return;
        const sVal = PETS[myPet].sVal;
        document.getElementById('s-b').disabled = true;
        if(myPet === "Pinky") applyDmg(p2HP, Math.min(m1, p1HP + sVal));
        else applyDmg(p2HP - sVal, p1HP);
        setTimeout(() => { if(isPlaying) document.getElementById('s-b').disabled = false; }, 8000);
    }

    function applyDmg(newEHP, newMHP) {
        if(mode === 'solo') { p2HP = newEHP; p1HP = newMHP; updateBars(); if(p2HP <= 0) finalize(true); }
        else {
            const up = {};
            if(myRole === 'p1') { up.p2_hp = newEHP; up.p1_hp = newMHP; }
            else { up.p1_hp = newEHP; up.p2_hp = newMHP; }
            db.ref('rooms/' + roomID).update(up);
        }
    }

    function updateBars() {
        document.getElementById('hp-p1').style.width = (p1HP/m1*100) + "%";
        document.getElementById('hp-p2').style.width = (p2HP/m2*100) + "%";
    }

    function finalize(win) {
        isPlaying = false;
        alert(win ? "TEBRİKLER! +100 Altın" : "YENİLDİN!");
        if(win) { gold += 100; sync(); }
        if(roomID && myRole === 'p1') db.ref('rooms/' + roomID).remove();
        location.reload();
    }

    function openShop() { document.getElementById('home').style.display='none'; document.getElementById('shop').style.display='flex'; }
    function closeShop() { document.getElementById('shop').style.display='none'; document.getElementById('home').style.display='flex'; }
    function buyChest() {
        if(gold < 1000) return alert("Yetersiz Altın!");
        const pool = ["Browny", "Sleapy", "Stary", "Dinory"].filter(x => !unlocked.includes(x));
        if(pool.length === 0) return alert("Tüm karakterler açık!");
        gold -= 1000;
        const got = pool[Math.floor(Math.random()*pool.length)];
        unlocked.push(got); sync();
        alert("KUTUDAN ÇIKAN: " + got); location.reload();
    }
</script>
</body>
</html>
