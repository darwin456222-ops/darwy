<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tom Savaşları Online Pro</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #000; color: #fff; touch-action: none; user-select: none; overflow: hidden; }
        #top-bar { position: fixed; top: 0; width: 100%; background: #222; z-index: 2000; padding: 5px 0; border-bottom: 2px solid #f39c12; text-align: center; }
        #progress-bg { width: 70%; height: 8px; background: #444; margin: 4px auto; border-radius: 4px; }
        #progress-fill { height: 100%; width: 0%; background: #f1c40f; transition: 0.5s; border-radius: 4px; }

        #menu, #shop, #selection { position: fixed; inset: 0; z-index: 3000; display: flex; flex-direction: column; align-items: center; justify-content: center; background: radial-gradient(circle, #1a2a6c, #000); }
        #selection { display: none; padding-top: 70px; overflow-y: auto; justify-content: flex-start; background: #111; }
        
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 95%; padding-bottom: 20px; }
        .item { background: #222; border: 2px solid #444; border-radius: 10px; height: 110px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .item img { width: 70px; height: 70px; object-fit: contain; }
        .locked { filter: grayscale(1) brightness(0.4); }

        #arena { height: 48vh; background: radial-gradient(circle at 50% 50%, rgba(30, 50, 150, 0.4), #000 90%); position: relative; display: none; align-items: flex-end; justify-content: center; border-bottom: 4px solid #000; }
        .hud { position: absolute; top: 60px; width: 92%; display: flex; justify-content: space-between; z-index: 10; }
        .bar-wrap { width: 130px; background: rgba(0,0,0,0.6); padding: 5px; border-radius: 6px; }
        .b-bg { width: 100%; height: 14px; background: #333; border-radius: 7px; overflow: hidden; position: relative; }
        .hp-f { height: 100%; background: linear-gradient(#4cd137, #44bd32); width: 100%; transition: 0.1s; }
        .hp-critical { background: linear-gradient(#e74c3c, #c0392b) !important; }

        #ctrl { height: 52vh; display: none; }
        .side { flex: 1; display: flex; flex-direction: column; }
        .atk-btn { flex: 1; background: #1a2a6c; color: #fff; font-size: 26px; font-weight: bold; border: 1px solid #000; outline: none; }
        .atk-btn:active { background: #e74c3c; }
        
        .btn { width: 220px; padding: 15px; margin: 8px; border-radius: 30px; border: none; font-weight: bold; font-size: 18px; box-shadow: 0 4px #000; cursor: pointer; }
        .input-name { padding: 12px; border-radius: 15px; border: 2px solid #f39c12; width: 200px; text-align: center; margin-bottom: 10px; font-weight: bold; background: #fff; color: #000; }
        .char-box { width: 130px; height: 130px; position: absolute; bottom: 15px; transition: transform 0.1s; }
        .char-box img { max-width: 100%; max-height: 100%; object-fit: contain; }

        /* Vurulma Efekti (Sallanma) */
        .shake { animation: shakeAnim 0.2s ease-in-out; }
        @keyframes shakeAnim {
            0% { transform: translateX(0); }
            25% { transform: translateX(10px) rotate(5deg); }
            50% { transform: translateX(-10px) rotate(-5deg); }
            100% { transform: translateX(0); }
        }
    </style>
</head>
<body>

<div id="top-bar">
    <div style="color:#f1c40f; font-weight:bold;">🏆 <span id="k-txt">0</span></div>
    <div id="progress-bg"><div id="progress-fill"></div></div>
</div>

<div id="menu">
    <h1 style="margin-bottom:10px; text-shadow: 2px 2px #000;">TOM ONLINE PRO</h1>
    <input type="text" id="playerNameInput" class="input-name" placeholder="İsmini Yaz..." maxlength="10">
    <button class="btn" style="background:#2ecc71" onclick="openS('bot')">TEK OYUNCU (BOT)</button>
    <button class="btn" style="background:#3498db" onclick="openS('create')">ODA KUR (ONLINE)</button>
    <button class="btn" style="background:#9b59b6" onclick="openS('join')">ODAYA KATIL</button>
    <button class="btn" style="background:#f1c40f; color:#000;" onclick="openShop()">🏪 DÜKKAN</button>
</div>

<div id="shop" style="display:none">
    <img src="megakutu.jpg" style="width:180px; border-radius:20px; border:4px solid #f1c40f;">
    <button class="btn" style="background:#2ecc71" onclick="buyB()">1000 🏆 MEGA KUTU</button>
    <button class="btn" style="background:#444" onclick="closeShop()">GERİ</button>
</div>

<div id="selection"><div class="grid" id="grid"></div></div>

<div id="arena">
    <div class="hud">
        <div class="bar-wrap">
            <div class="b-bg"><div id="h1" class="hp-f"></div></div>
            <span id="display-name1" style="font-size:12px; font-weight:bold; color:#f1c40f;">Yükleniyor...</span>
        </div>
        <div class="bar-wrap" style="text-align:right">
            <div class="b-bg"><div id="h2" class="hp-f"></div></div>
            <span id="display-name2" style="font-size:12px; font-weight:bold; color:#f1c40f;">Bekleniyor...</span>
        </div>
    </div>
    <div class="char-box" id="box1" style="left:10%"><img id="img1"></div>
    <div class="char-box" id="box2" style="right:10%; transform:scaleX(-1)"><img id="img2"></div>
</div>

<div id="ctrl">
    <div class="side"><button class="atk-btn" onclick="hitRequest()">VUR!</button></div>
</div>

<script>
    // Firebase Config - Senin Database Bilgilerin
    const firebaseConfig = { databaseURL: "https://tomoyunu-5cd2f-default-rtdb.europe-west1.firebasedatabase.app/" };
    
    try {
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Karakter Listesi
        const chars = ["Tom","Angela","Hank","Becca","Ben","Ginger","Hippo","Ginna","Roy","Gus","Flip","Squeak","Blinky","Dot","Sugar"];
        let kupa = parseInt(localStorage.getItem('kupa')) || 0;
        let unlocked = JSON.parse(localStorage.getItem('unlocked')) || ["Tom","Angela"];
        let playerName = localStorage.getItem('p_name') || "Oyuncu";
        
        document.getElementById('playerNameInput').value = playerName;

        let p1, p2, hp1=100, hp2=100, mode, roomCode, myRole;
        let isGameOver = false;

        function saveName() {
            let n = document.getElementById('playerNameInput').value;
            if(n) { playerName = n; localStorage.setItem('p_name', n); }
        }

        // Karakter Seçim Ekranı
        function openS(m) {
            saveName();
            mode = m; 
            document.getElementById('menu').style.display='none'; 
            document.getElementById('selection').style.display='flex';
            const g = document.getElementById('grid'); g.innerHTML = "";
            chars.forEach(n => {
                let lock = !unlocked.includes(n);
                let d = document.createElement('div'); d.className = 'item' + (lock?' locked':'');
                // İpucu Uygulandı: Resim isimleri küçük harfe çevrildi (.toLowerCase())
                d.innerHTML = `<img src="${n.toLowerCase()}.jpg"><p style="font-size:10px;">${n}</p>`;
                if(!lock) d.onclick = () => { p1=n; handleStart(); };
                g.appendChild(d);
            });
        }

        function handleStart() {
            if(mode === 'bot') {
                p2 = unlocked[Math.floor(Math.random()*unlocked.length)];
                startLocal();
            } else if(mode === 'create') {
                roomCode = Math.floor(1000 + Math.random() * 9000);
                myRole = "p1";
                db.ref('rooms/' + roomCode).set({ 
                    p1_hp: 100, p2_hp: 100, p1_char: p1, p1_name: playerName,
                    p2_char: "", p2_name: "Bekleniyor...", status: "waiting" 
                });
                alert("ODA KODUN: " + roomCode);
                listenRoom();
            } else if(mode === 'join') {
                roomCode = prompt("Oda Kodunu Gir:");
                if(!roomCode) return;
                myRole = "p2";
                db.ref('rooms/' + roomCode).update({ p2_char: p1, p2_name: playerName, status: "playing" });
                listenRoom();
            }
        }

        function startLocal() {
            document.getElementById('selection').style.display='none'; 
            document.getElementById('arena').style.display='flex'; 
            document.getElementById('ctrl').style.display='flex';
            // Resimler küçük harf olarak yükleniyor
            document.getElementById('img1').src = p1.toLowerCase()+".jpg"; 
            document.getElementById('img2').src = p2.toLowerCase()+".jpg";
            document.getElementById('display-name1').innerText = playerName;
            document.getElementById('display-name2').innerText = "Bot " + p2;
            
            if(mode === 'bot') {
                const botInterval = setInterval(() => { 
                    if(hp1 > 0 && hp2 > 0) { 
                        hp1 -= 5; 
                        triggerEffect('box1'); // Bot oyuncuya vurduğunda efekt
                        upHUD(); 
                        checkWin(); 
                    } else {
                        clearInterval(botInterval);
                    }
                }, 1000);
            }
        }

        function listenRoom() {
            db.ref('rooms/' + roomCode).on('value', (snap) => {
                const data = snap.val(); 
                if(!data || isGameOver) return;
                
                // Eğer can azaldıysa vurulma efekti tetikle
                if(data.p1_hp < hp1) triggerEffect(myRole === "p1" ? 'box1' : 'box2');
                if(data.p2_hp < hp2) triggerEffect(myRole === "p1" ? 'box2' : 'box1');

                hp1 = data.p1_hp; hp2 = data.p2_hp;
                upHUD();

                if(data.status === "playing" || (myRole === "p1" && data.p1_char)) {
                    document.getElementById('selection').style.display='none'; 
                    document.getElementById('arena').style.display='flex'; 
                    document.getElementById('ctrl').style.display='flex';
                    
                    if(myRole === "p1") {
                        document.getElementById('display-name1').innerText = data.p1_name || "Oyuncu 1";
                        document.getElementById('display-name2').innerText = data.p2_name || "Bekleniyor...";
                        p2 = data.p2_char;
                    } else {
                        document.getElementById('display-name1').innerText = data.p2_name || "Oyuncu 2";
                        document.getElementById('display-name2').innerText = data.p1_name || "Oyuncu 1";
                        p2 = data.p1_char;
                    }
                    
                    if(p1) document.getElementById('img1').src = p1.toLowerCase()+".jpg";
                    if(p2) document.getElementById('img2').src = p2.toLowerCase()+".jpg";
                }
                if(hp1 <= 0 || hp2 <= 0) { checkWin(); }
            });
        }

        function hitRequest() {
            if(isGameOver) return;
            if(mode === 'bot') { 
                hp2 = Math.max(0, hp2 - 10); 
                triggerEffect('box2'); // Bot'a vurduğunda efekt
                upHUD(); 
                checkWin(); 
                return; 
            }
            if(myRole === "p1") db.ref('rooms/' + roomCode).update({ p2_hp: Math.max(0, hp2 - 8) });
            else db.ref('rooms/' + roomCode).update({ p1_hp: Math.max(0, hp1 - 8) });
        }

        // Vurulma Efekti Fonksiyonu
        function triggerEffect(targetId) {
            const el = document.getElementById(targetId);
            el.classList.remove('shake');
            void el.offsetWidth; // Animasyonu resetlemek için "magic" satır
            el.classList.add('shake');
        }

        function upHUD() {
            const b1 = document.getElementById('h1'), b2 = document.getElementById('h2');
            b1.style.width = hp1 + "%"; b2.style.width = hp2 + "%";
            b1.classList.toggle('hp-critical', hp1 < 30);
            b2.classList.toggle('hp-critical', hp2 < 30);
        }

        function checkWin() {
            if(isGameOver) return;
            if(hp1 <= 0 || hp2 <= 0) {
                isGameOver = true;
                let win = (myRole === "p1" && hp2 <= 0) || (myRole === "p2" && hp1 <= 0) || (mode === "bot" && hp2 <= 0);
                if(win) kupa += 100;
                localStorage.setItem('kupa', kupa);
                alert(win ? "TEBRİKLER! KAZANDIN 🏆" : "MAALESEF KAYBETTİN!");
                if(roomCode && myRole === "p1") db.ref('rooms/' + roomCode).remove();
                setTimeout(() => { location.reload(); }, 500);
            }
        }

        function openShop() { document.getElementById('shop').style.display='flex'; }
        function closeShop() { document.getElementById('shop').style.display='none'; }
        function buyB() {
            if(kupa >= 1000) {
                kupa -= 1000;
                let lockedChars = chars.filter(x => !unlocked.includes(x));
                if(lockedChars.length > 0) {
                    let won = lockedChars[Math.floor(Math.random() * lockedChars.length)];
                    unlocked.push(won);
                    localStorage.setItem('unlocked', JSON.stringify(unlocked));
                    alert("Kutudan " + won + " Çıktı!");
                } else {
                    alert("Tüm karakterler zaten açık!");
                }
                localStorage.setItem('kupa', kupa);
                location.reload();
            } else alert("Yetersiz Kupa!");
        }
        document.getElementById('k-txt').innerText = kupa;
        
    } catch (e) {
        console.error("Hata:", e);
    }
</script>
</body>
</html>
