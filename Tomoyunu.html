<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tom ve Arkadaşları - Buton Düzenlemesi</title>
    <style>
        body { margin: 0; font-family: 'Segoe UI', Arial, sans-serif; background: #111; color: white; touch-action: none; user-select: none; overflow: hidden; }
        
        /* MODERN GRID SEÇİM EKRANI */
        #selection-screen { 
            position: fixed; inset: 0; 
            background: linear-gradient(135deg, #1a1a1a 0%, #2c3e50 100%); 
            z-index: 2000; padding: 20px; text-align: center; 
            display: flex; flex-direction: column; align-items: center; overflow-y: auto; 
        }
        .char-grid { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 12px; width: 100%; max-width: 450px; margin-top: 15px;
        }
        .char-item { 
            background: rgba(255, 255, 255, 0.1); padding: 15px; border-radius: 15px; 
            border: 2px solid #555; transition: 0.2s; display: flex; flex-direction: column; align-items: center;
        }
        .char-item:active { background: rgba(0, 242, 254, 0.2); border-color: #00f2fe; transform: scale(0.9); }
        .char-item span { font-size: 45px; margin-bottom: 5px; }
        .char-item p { margin: 0; font-size: 14px; font-weight: bold; color: #fff; }

        /* ARENA VE CAN BARLARI */
        #arena { width: 100%; height: 50vh; background: radial-gradient(circle, #1e3c72, #050a14); position: relative; display: flex; justify-content: center; align-items: flex-end; border-bottom: 4px solid #fff; }
        .hud { position: absolute; top: 35px; width: 92%; display: flex; justify-content: space-between; z-index: 100; }
        .bar-container { width: 160px; height: 20px; background: #000; border-radius: 10px; border: 2px solid #fff; overflow: hidden; margin-bottom: 5px; }
        .hp-fill { height: 100%; width: 100%; background: #2ecc71; transition: width 0.2s; }
        .sp-fill { height: 100%; width: 0%; background: #00f2fe; transition: width 0.2s; }
        
        .char-container { position: absolute; bottom: 20px; display: flex; flex-direction: column; align-items: center; }
        .emoji { font-size: 85px; filter: drop-shadow(0 5px 10px rgba(0,0,0,0.5)); }
        #p1-wrap { left: 10%; } #p2-wrap { right: 10%; }
        #p2-wrap .emoji { transform: scaleX(-1); }

        /* KONTROLLER - TAM DENGELENMİŞ */
        #controls { height: 50vh; display: flex; background: #000; }
        .p-area { flex: 1; display: flex; flex-direction: column; height: 100%; }
        
        .atk-btn { 
            flex: 3; /* Alanın büyük kısmını kaplar */
            border: none; font-size: 24px; font-weight: 900; color: white; outline: none; 
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .ult-btn { 
            flex: 1.5; /* Alt kısımda yeterli alan kaplar */
            border: none; font-size: 18px; font-weight: bold; color: white; 
            background: #222; opacity: 0.5; border: 1px solid rgba(255,255,255,0.1);
        }

        .ult-ready { 
            background: #f1c40f !important; opacity: 1 !important; color: #000 !important; 
            box-shadow: inset 0 0 20px #fff, 0 0 15px #f1c40f; 
        }

        #btn-1-atk { background: #1a2a6c; }
        #btn-2-atk { background: #b21f1f; } /* Sağ taraftaki saldırı rengi */

        .anim-1 { animation: hitL 0.2s; }
        .anim-2 { animation: hitR 0.2s; }
        @keyframes hitL { 50% { transform: translateX(60px); } }
        @keyframes hitR { 50% { transform: translateX(-60px); } }

        #win-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 3000; }
        #start-btn { margin-top: 20px; padding: 15px 40px; font-size: 20px; background: #27ae60; color: white; border: none; border-radius: 30px; display: none; font-weight: bold; }
    </style>
</head>
<body>

<div id="selection-screen">
    <h1 style="color:#00f2fe; margin: 0;">KARAKTER SEÇ</h1>
    <h3 id="info-text" style="margin: 10px 0;">1. Oyuncu Seçimi</h3>
    <div class="char-grid" id="grid"></div>
    <button id="start-btn" onclick="startMatch()">SAVAŞI BAŞLAT</button>
</div>

<div id="arena">
    <div class="hud">
        <div>
            <div id="n1" style="font-weight:bold; font-size: 16px; text-shadow: 1px 1px 2px #000;">P1</div>
            <div class="bar-container"><div id="h1" class="hp-fill"></div></div>
            <div class="bar-container"><div id="s1" class="sp-fill"></div></div>
        </div>
        <div style="text-align:right">
            <div id="n2" style="font-weight:bold; font-size: 16px; text-shadow: 1px 1px 2px #000;">P2</div>
            <div class="bar-container" style="margin-left:auto"><div id="h2" class="hp-fill"></div></div>
            <div class="bar-container" style="margin-left:auto"><div id="s2" class="sp-fill"></div></div>
        </div>
    </div>
    <div id="p1-wrap" class="char-container"><div class="emoji" id="e1"></div></div>
    <div id="p2-wrap" class="char-container"><div class="emoji" id="e2"></div></div>
</div>

<div id="controls">
    <div class="p-area">
        <button class="atk-btn" id="btn-1-atk">SALDIRI</button>
        <button class="ult-btn" id="btn-1-ult">ULTİ</button>
    </div>
    <div class="p-area">
        <button class="atk-btn" id="btn-2-atk">SALDIRI</button>
        <button class="ult-btn" id="btn-2-ult">ULTİ</button>
    </div>
</div>

<div id="win-overlay">
    <h1 id="win-text">KAZANDIN!</h1>
    <button onclick="location.reload()" style="padding:15px 30px; font-size:18px; border-radius:10px; background:#f39c12; color:white; border:none;">Tekrar Oyna</button>
</div>

<script>
    const chars = [
        {n: "Tom", e: "🐱", u: "PENÇE", power: 12}, 
        {n: "Angela", e: "🐈", u: "ŞİFA", power: 10}, 
        {n: "Pierre", e: "🦜", u: "SES", power: 11}, 
        {n: "Hank", e: "🐶", u: "KEMİK", power: 9},
        {n: "Ginger", e: "🐈‍⬛", u: "FİŞEK", power: 11}, 
        {n: "Roy", e: "🦝🕶️", u: "SOYGUN", power: 14},
        {n: "Ben", e: "🐶🧪", u: "İCAT", power: 13},
        {n: "Becca", e: "🐰🎤", u: "KONSER", power: 12},
        {n: "Gina", e: "🦒✨", u: "YILDIZ", power: 11},
        {n: "Santi", e: "🐐", u: "TEKME", power: 12}
    ];

    let p1c = null, p2c = null, hp1 = 200, hp2 = 200, maxHp = 200, sp1 = 0, sp2 = 0;

    function setup() {
        const grid = document.getElementById('grid');
        chars.forEach((c, i) => {
            let d = document.createElement('div');
            d.className = 'char-item';
            d.innerHTML = `<span>${c.e}</span><p>${c.n}</p>`;
            d.onclick = () => select(i);
            grid.appendChild(d);
        });
    }

    function select(i) {
        if(!p1c) {
            p1c = chars[i];
            document.getElementById('info-text').innerText = "2. Oyuncu Seçimi";
            document.getElementById('info-text').style.color = "#ff4757";
        } else if(!p2c) {
            p2c = chars[i];
            document.getElementById('start-btn').style.display = 'inline-block';
            document.getElementById('info-text').innerText = "HAZIR!";
            document.getElementById('info-text').style.color = "#2ecc71";
        }
    }

    function startMatch() {
        document.getElementById('selection-screen').style.display = 'none';
        document.getElementById('n1').innerText = p1c.n;
        document.getElementById('n2').innerText = p2c.n;
        document.getElementById('e1').innerText = p1c.e;
        document.getElementById('e2').innerText = p2c.e;
        document.getElementById('btn-1-ult').innerText = p1c.u;
        document.getElementById('btn-2-ult').innerText = p2c.u;
        
        const btns = [
            {id:'btn-1-atk', p:1, t:'atk'}, {id:'btn-1-ult', p:1, t:'ult'},
            {id:'btn-2-atk', p:2, t:'atk'}, {id:'btn-2-ult', p:2, t:'ult'}
        ];
        btns.forEach(b => {
            const el = document.getElementById(b.id);
            el.addEventListener('touchstart', (e) => { e.preventDefault(); action(b.p, b.t); }, {passive: false});
            el.addEventListener('mousedown', () => action(b.p, b.t));
        });
    }

    function action(p, type) {
        if(hp1 <= 0 || hp2 <= 0) return;
        if(type === 'atk') {
            if(p === 1) { hp2 -= p1c.power; sp1 = Math.min(100, sp1 + 15); anim(1); }
            else { hp1 -= p2c.power; sp2 = Math.min(100, sp2 + 15); anim(2); }
        } else {
            if(p === 1 && sp1 >= 100) {
                if(p1c.n === "Angela") hp1 = Math.min(maxHp, hp1 + 60);
                else hp2 -= p1c.power * 2.5;
                sp1 = 0; anim(1);
            } else if(p === 2 && sp2 >= 100) {
                if(p2c.n === "Angela") hp2 = Math.min(maxHp, hp2 + 60);
                else hp1 -= p2c.power * 2.5;
                sp2 = 0; anim(2);
            }
        }
        update();
    }

    function anim(p) {
        const el = document.getElementById('p' + p + '-wrap');
        el.classList.remove('anim-1', 'anim-2');
        void el.offsetWidth;
        el.classList.add('anim-' + p);
    }

    function update() {
        document.getElementById('h1').style.width = (Math.max(0, hp1) / maxHp * 100) + "%";
        document.getElementById('h2').style.width = (Math.max(0, hp2) / maxHp * 100) + "%";
        document.getElementById('s1').style.width = sp1 + "%";
        document.getElementById('s2').style.width = sp2 + "%";
        
        const u1 = document.getElementById('btn-1-ult'), u2 = document.getElementById('btn-2-ult');
        if(sp1 >= 100) u1.classList.add('ult-ready'); else u1.classList.remove('ult-ready');
        if(sp2 >= 100) u2.classList.add('ult-ready'); else u2.classList.remove('ult-ready');

        if(hp1 <= 0 || hp2 <= 0) {
            document.getElementById('win-overlay').style.display = 'flex';
            document.getElementById('win-text').innerText = hp1 <= 0 ? p2c.n + " KAZANDI!" : p1c.n + " KAZANDI!";
        }
    }
    setup();
</script>
</body>
</html>
